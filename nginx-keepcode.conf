# KeepCode AI Nginx Configuration
# HTTP-only initial configuration. This allows Nginx to start successfully
# so that Certbot can validate and generate the SSL certificates.
#
# Once this is active, run the following command on your VPS to enable SSL:
# sudo certbot --nginx -d keepcodeai.com -d www.keepcodeai.com -d api.keepcodeai.com

server {
    listen 80;
    server_name keepcodeai.com www.keepcodeai.com api.keepcodeai.com;

    # Proxy to port 8000 (Express app serving React frontend & Backend APIs)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
