name: KeepCode AI IDE Derleme Robotu

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: 'npm'

      - name: Antivirus Korumasini Kapat (Hizlandirma)
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: powershell
        continue-on-error: true

      - name: Gulp Kur
        run: npm install -g gulp-cli

      - name: MSBuild Yolunu Bul ve Yapilandir (Derleyici Donmasini Coz)
        run: |
          $msbuild = (Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Filter MSBuild.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if ($msbuild) {
            Write-Host "MSBuild Bulundu: $msbuild"
            echo "npm_config_msbuild_path=$msbuild" >> $env:GITHUB_ENV
            echo "MSBUILD_PATH=$msbuild" >> $env:GITHUB_ENV
          } else {
            Write-Error "MSBuild.exe bulunamadi!"
          }
        shell: powershell

      # 1. Asama: VS Code'un tum agir bagimliliklarini yukle
      - name: Bağımlılıkları Yükle
        run: npm ci

      # 2. Aşama: Windows x64 için optimize edilmiş derlemeyi başlat
      - name: VS Code Paketini Derle
        run: npx gulp vscode-win32-x64-min

      # 3. Aşama: out-vscode-min klasörünü zipleyip indirme linki yap
      - name: Derlenen Klasörü Paketle
        uses: actions/upload-artifact@v4
        with:
          name: KeepCode-AI-Windows-x64
          path: out-vscode-min/
