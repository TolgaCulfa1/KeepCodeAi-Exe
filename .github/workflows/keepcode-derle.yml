name: KeepCode AI IDE Setup Derleme Robotu

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write

    env:
      VSCODE_SKIP_NODE_VERSION_CHECK: 'true'
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_OPTIONS: --max_old_space_size=6144

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v7

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          cache: 'npm'

      - name: Antivirus Korumasini Kapat (Hizlandirma)
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: powershell
        continue-on-error: true

      - name: Gulp Kur
        run: npm install -g gulp-cli

      - name: Bağımlılıkları Yükle
        run: npm ci

      - name: VS Code Paketini Derle
        run: npx gulp vscode-win32-x64-min

      - name: Derleme Dogrulama - Kritik Dosyalar
        run: |
          $buildDir = Join-Path (Split-Path (Get-Location) -Parent) "VSCode-win32-x64"
          Write-Host "=== Build Directory ==="
          Write-Host $buildDir
          
          # product.json kontrol
          $productJson = Get-Content (Join-Path $buildDir "resources\app\product.json") | ConvertFrom-Json
          Write-Host "=== product.json commit: $($productJson.commit) ==="
          Write-Host "=== product.json quality: $($productJson.quality) ==="
          Write-Host "=== product.json version: $($productJson.version) ==="
          
          if (-not $productJson.commit) {
            Write-Host "::error::product.json commit hash is empty!"
            exit 1
          }
          
          # Kritik dosyalarin varligini kontrol et
          $criticalFiles = @(
            "resources\app\out\main.js",
            "resources\app\out\vs\code\electron-browser\workbench\workbench.js",
            "resources\app\out\vs\code\electron-browser\workbench\workbench.html",
            "resources\app\out\vs\workbench\workbench.desktop.main.js",
            "resources\app\out\vs\workbench\workbench.desktop.main.css",
            "resources\app\out\vs\base\parts\sandbox\electron-browser\preload.js"
          )
          
          $allExist = $true
          foreach ($file in $criticalFiles) {
            $fullPath = Join-Path $buildDir $file
            if (Test-Path $fullPath) {
              $size = (Get-Item $fullPath).Length
              Write-Host "OK: $file ($size bytes)"
            } else {
              Write-Host "::error::EKSIK: $file"
              $allExist = $false
            }
          }
          
          if (-not $allExist) {
            Write-Host "::error::Kritik dosyalar eksik! IDE acilmayacaktir."
            exit 1
          }
          
          Write-Host "=== Tum kritik dosyalar mevcut ==="
        shell: powershell

      - name: Sadece Kurulum Sihirbazını Derle (Setup EXE)
        run: npx gulp vscode-win32-x64-user-setup

      - name: Kurulum Sihirbazını GitHub Actions'a Yükle (Garanti İndirme Linki)
        uses: actions/upload-artifact@v4
        with:
          name: KeepCode-AI-Windows-x64-Installer
          path: .build/win32-x64/user-setup/*.exe

      - name: GitHub Release'e Ekle (Otomatik Güncelleyici İçin)
        uses: softprops/action-gh-release@v2
        continue-on-error: true # İzin hatası verirse durmasın, üstteki adımdan indirilebilsin
        with:
          name: KeepCode AI Güncel Sürüm
          tag_name: latest
          files: .build/win32-x64/user-setup/*.exe
          make_latest: true
