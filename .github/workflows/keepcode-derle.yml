name: KeepCode AI IDE Derleme Robotu

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    env:
      VSCODE_SKIP_NODE_VERSION_CHECK: 'true'
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          cache: 'npm'

      - name: Antivirus Korumasini Kapat (Hizlandirma)
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: powershell
        continue-on-error: true

      - name: Gulp Kur
        run: npm install -g gulp-cli

      # 1. Asama: VS Code'un tum agir bagimliliklarini yukle
      - name: Bağımlılıkları Yükle
        run: npm ci

      # 2. Aşama: Windows x64 için optimize edilmiş derlemeyi başlat
      - name: VS Code Paketini Derle
        run: npx gulp vscode-win32-x64-min

      # 3. Aşama: Windows Setup Wizard (Kurulum Exesi) Derle
      - name: Kurulum Sihirbazını Derle
        run: npx gulp vscode-win32-x64-user-setup

      # 4. Aşama: VSCode-win32-x64 klasörünü workspace içine taşı
      - name: Derlenen Klasörü Taşı
        run: Move-Item -Path ../VSCode-win32-x64 -Destination ./VSCode-win32-x64
        shell: powershell

      # 5. Aşama: Taşınabilir (Portable) Sürümü Paketle
      - name: Taşınabilir Sürümü Paketle (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: KeepCode-AI-Windows-x64-Portable
          path: VSCode-win32-x64/

      # 6. Aşama: Kurulum Sihirbazı (Setup Installer) Paketle
      - name: Kurulum Sihirbazını Paketle (EXE)
        uses: actions/upload-artifact@v4
        with:
          name: KeepCode-AI-Windows-x64-Installer
          path: .build/win32-x64/user-setup/

      # 7. Aşama: Auto Updater için GitHub Release Oluştur
      - name: GitHub Release (Latest) Güncelle
        uses: softprops/action-gh-release@v2
        with:
          name: KeepCode AI Güncel Sürüm
          tag_name: latest
          files: |
            .build/win32-x64/user-setup/*.exe
            VSCode-win32-x64/*.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
