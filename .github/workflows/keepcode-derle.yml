name: KeepCode AI IDE Derleme Robotu

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          cache: 'npm'

      - name: Antivirus Korumasini Kapat (Hizlandirma)
        run: Set-MpPreference -DisableRealtimeMonitoring $true
        shell: powershell
        continue-on-error: true

      - name: Gulp Kur
        run: npm install -g gulp-cli

      # 1. Asama: VS Code'un tum agir bagimliliklarini yukle
      - name: Bağımlılıkları Yükle
        run: npm ci

      # 2. Aşama: Windows x64 için optimize edilmiş derlemeyi başlat
      - name: VS Code Paketini Derle
        run: npx gulp vscode-win32-x64-min

      # 3. Aşama: out-vscode-min klasörünü zipleyip indirme linki yap
      - name: Derlenen Klasörü Paketle
        uses: actions/upload-artifact@v4
        with:
          name: KeepCode-AI-Windows-x64
          path: out-vscode-min/
